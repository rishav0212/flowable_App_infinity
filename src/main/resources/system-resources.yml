system:
  resources:
    # --- DASHBOARD ---
    # --- INSTANCE MANAGEMENT ---
    - key: "page:instance_manager"
      type: "page"
      displayName: "Running Instances Viewer"
      description: "Allows the user to view the list of all active and historic process instances."
      actions:
        - name: "view"
          description: "Basic capability to view the instance list."
        - name: "delete_instance"
          description: "DANGEROUS: Grants the ability to permanently terminate or delete running process instances."