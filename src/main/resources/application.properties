spring.application.name=flowable-app

# --- Database Placeholder (Overridden by local file) ---

spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# --- Cloud SQL Placeholders ---
# These cause the crash if missing! We define them as placeholders 
# so the local file can fill them in.
spring.cloud.gcp.sql.database-name=${SPRING_CLOUD_GCP_SQL_DATABASE_NAME}
spring.cloud.gcp.sql.instance-connection-name=${SPRING_CLOUD_GCP_SQL_INSTANCE_CONNECTION_NAME}
spring.cloud.gcp.credentials.location=${SPRING_CLOUD_GCP_CREDENTIALS_LOCATION}

# --- Flowable ---
flowable.database-schema-update=true
flowable.rest.app.api.enabled=true
flowable.history.level=audit
spring.jpa.hibernate.ddl-auto=none
flowable.rest.app.security.enabled=false
spring.security.user.name=admin
spring.security.user.password=test

# --- Form.io ---
formio.url=${FORMIO_URL}
app.frontend.url=${APP_FRONTEND_URL}
formio.admin-email=${FORMIO_ADMIN_EMAIL}
formio.admin-password=${FORMIO_ADMIN_PASSWORD}

# --- Security ---
spring.security.oauth2.client.registration.google.client-id=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
app.jwt.secret=${APP_JWT_SECRET}

# Force HTTPS for OAuth2 Redirect
# Add :http://localhost:8080 as a default value
spring.security.oauth2.client.registration.google.redirect-uri=${APP_BACKEND_URL:http://localhost:8080}/login/oauth2/code/google
app.backend.url=${APP_BACKEND_URL:http://localhost:8080}

# ... existing properties ...

google.drive.credentials.path=${GOOGLE_DRIVE_CREDENTIALS_PATH:}
# 🟢 CRITICAL: This tells Spring to load your local file!
spring.config.import=optional:classpath:application-local.properties