spring.application.name=flowable-app

# --- Database Setup ---
# Matches env_vars: SPRING_DATASOURCE_USERNAME
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
# Matches secrets: SPRING_DATASOURCE_PASSWORD
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# --- Cloud SQL Configuration ---
# Matches env_vars: SPRING_CLOUD_GCP_SQL_DATABASE_NAME, etc.
spring.cloud.gcp.sql.database-name=${SPRING_CLOUD_GCP_SQL_DATABASE_NAME}
spring.cloud.gcp.sql.instance-connection-name=${SPRING_CLOUD_GCP_SQL_INSTANCE_CONNECTION_NAME}
spring.cloud.gcp.credentials.location=${SPRING_CLOUD_GCP_CREDENTIALS_LOCATION}

# --- Flowable ---
flowable.database-schema-update=true
flowable.rest.app.api.enabled=true
flowable.history.level=audit
spring.jpa.hibernate.ddl-auto=none
flowable.rest.app.security.enabled=false
spring.security.user.name=admin
spring.security.user.password=test

# --- Form.io & Custom App Config ---
# Matches env_vars: SPRING_FORMIO_URL
formio.url=${SPRING_FORMIO_URL:http://localhost:3001}
# Matches env_vars: SPRING_APP_FRONTEND_URL
app.frontend.url=${SPRING_APP_FRONTEND_URL}
# Matches env_vars: SPRING_FORMIO_ADMIN_EMAIL
formio.admin-email=${SPRING_FORMIO_ADMIN_EMAIL}
# Matches secrets: SPRING_FORMIO_ADMIN_PASSWORD
formio.admin-password=${SPRING_FORMIO_ADMIN_PASSWORD}
spring.jooq.sql-dialect=MYSQL
# --- Security & JWT ---
# Matches secrets: SPRING_APP_JWT_SECRET
app.jwt.secret=${SPRING_APP_JWT_SECRET}
# Matches env_vars: SPRING_APP_BACKEND_URL (Default to localhost if missing)
app.backend.url=${SPRING_APP_BACKEND_URL:http://localhost:8080}

# --- OAuth2 Google Configuration ---
# Matches env_vars: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-id=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID}

# Matches secrets: SPRING_SPRING_SECURITY... (Note the double SPRING from your YAML)
spring.security.oauth2.client.registration.google.client-secret=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET}

spring.security.oauth2.client.registration.google.scope=email,profile

# Matches env_vars: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_REDIRECT_URI
# Note: The Env Var in YAML will override this line automatically, but this aligns them.
spring.security.oauth2.client.registration.google.redirect-uri=${SPRING_APP_BACKEND_URL:http://localhost:8080}/login/oauth2/code/google

# --- Other Settings ---
server.forward-headers-strategy=framework
google.drive.credentials.path=${GOOGLE_DRIVE_CREDENTIALS_PATH:}

# --- Local Development Import ---
# This ensures your local file still works when running on your machine
spring.config.import=optional:classpath:application-local.properties

app.email.service-url=https://asia-south2-myfirsttestproject-456102.cloudfunctions.net/send-email-service
app.email.default-from= no-reply@notify.saarbiotech.com
app.email.default-name=Saar Biotech
app.email.default-reply-to=sandeep@saarbiotech.com


# --- ToolJet Configuration ---
# Matches env_vars: SPRING_TOOLJET_SECRET
spring.tooljet.secret=${SPRING_TOOLJET_SECRET}

# Matches env_vars: SPRING_TOOLJET_INTERNAL_URL
spring.tooljet.internal.url=${SPRING_TOOLJET_INTERNAL_URL}

# Matches env_vars: SPRING_TOOLJET_ORGANIZATION_ID
spring.tooljet.organization.id=${SPRING_TOOLJET_ORGANIZATION_ID}

# Matches secrets: SPRING_TOOLJET_ADMIN_EMAIL
spring.tooljet.admin.email=${SPRING_TOOLJET_ADMIN_EMAIL}

# Matches secrets: SPRING_TOOLJET_ADMIN_PASSWORD
spring.tooljet.admin.password=${SPRING_TOOLJET_ADMIN_PASSWORD}