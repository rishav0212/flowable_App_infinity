[request_definition]
r = sub, dom, obj, act

[policy_definition]
p = sub, dom, obj, act

[role_definition]
g = _, _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
# Changed keyMatch2 to standard keyMatch.
# keyMatch supports wildcard '*' (e.g. 'module:*') but safely ignores colons (':').
# This prevents 'module:users' from acting as a dynamic regex matching 'module:access_control'.
m = g(r.sub, p.sub, r.dom) && r.dom == p.dom && keyMatch(r.obj, p.obj) && (r.act == p.act || p.act == "*")