# --- Use H2 In-Memory Database ---
spring.datasource.url=jdbc:h2:mem:flowable;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# --- Flowable Config for Testing ---
# This ensures Flowable creates its tables in H2 automatically
flowable.database-schema-update=true
flowable.async-executor-activate=false

# --- Disable Security for easier API testing (Optional, but recommended for integration logic) ---
# If you want to test Security too, remove this and use .with(user(...)) in tests
spring.main.allow-bean-definition-overriding=true

# --- MOCK External Services configs ---
formio.url=http://localhost:9999
google.drive.folder-id=test-folder