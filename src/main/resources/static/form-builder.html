<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Form Builder</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/formiojs@4.15.0/dist/formio.full.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"/>

    <style>
        /* ── THEME VARIABLES ── */
        :root {
            --bg-canvas: #fafaf8;
            --bg-canvas-subtle: #f5f4f0;
            --bg-surface: #ffffff;
            --text-primary: #1a1715;
            --text-secondary: #4a443f;
            --text-tertiary: #736d66;
            --border-subtle: #eae8e1;

            /* Brand (Terracotta) */
            --brand-500: #e87548;
            --brand-600: #d4593a;

            /* Accent (Deep Plum) */
            --accent-50: #faf5fa;
            --accent-100: #f4ebf3;
            --accent-200: #e9d5e8;
            --accent-500: #a855a6;
            --accent-600: #8b3f89;
            --accent-700: #6f326f;

            /* Status */
            --status-success: #16a34a;
            --status-warning: #ea580c;
            --status-error: #dc2626;

            /* Radii & Shadows */
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --shadow-soft: 0 1px 3px 0 rgba(26, 23, 21, 0.04), 0 1px 2px -1px rgba(26, 23, 21, 0.02);
            --shadow-lifted: 0 4px 6px -1px rgba(26, 23, 21, 0.06), 0 2px 4px -2px rgba(26, 23, 21, 0.03);
            --shadow-brand: 0 2px 8px -2px rgba(232, 117, 72, 0.25);
            --shadow-accent: 0 2px 8px -2px rgba(168, 85, 166, 0.2);
            --transition-smooth: all 0.2s ease-in-out;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-canvas);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 13px;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a29e; }

        /* ── Top Toolbar ── */
        #toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-subtle);
            padding: 12px 24px;
            flex-shrink: 0;
            min-height: 64px;
            box-shadow: var(--shadow-soft);
            z-index: 10;
        }

        .toolbar-left { display: flex; align-items: center; gap: 20px; flex: 1; }

        .btn-back {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: var(--radius-md);
            transition: var(--transition-smooth);
        }
        .btn-back:hover { background: var(--bg-canvas-subtle); color: var(--text-primary); }

        .title-wrapper {
            display: flex;
            align-items: center;
            flex: 1;
            padding-left: 20px;
            border-left: 1px solid var(--border-subtle);
        }

        .title-inputs {
            display: flex;
            flex-direction: column;
            max-width: 400px;
        }

        #form-title-input {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-primary);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 700;
            outline: none;
            transition: var(--transition-smooth);
            margin-left: -8px;
            width: 100%;
        }
        #form-title-input:hover { background: var(--bg-canvas-subtle); }
        #form-title-input:focus { background: var(--bg-surface); border-color: var(--brand-400); box-shadow: 0 0 0 3px rgba(232, 117, 72, 0.1); }

        .path-group {
            display: flex;
            align-items: center;
            font-size: 11px;
            color: var(--text-tertiary);
            font-family: monospace;
            margin-top: 4px;
        }
        .path-group span { margin-right: 6px; font-weight: 600; letter-spacing: 0.05em; }

        #form-path-input {
            background: var(--accent-50);
            border: 1px solid var(--accent-200);
            color: var(--accent-700);
            font-family: inherit;
            font-size: 11px;
            font-weight: 600;
            outline: none;
            padding: 3px 8px;
            border-radius: 6px;
            width: 100%;
            max-width: 250px;
            transition: var(--transition-smooth);
        }
        #form-path-input:focus { background: var(--bg-surface); border-color: var(--accent-500); box-shadow: var(--shadow-accent); }

        /* API Path lock icon */
        .path-lock {
            margin-left: 8px;
            color: var(--text-tertiary);
            cursor: pointer;
            font-size: 13px;
            transition: var(--transition-smooth);
        }
        .path-lock:hover { color: var(--accent-500); }
        .path-lock.unlinked { color: var(--status-warning); }

        .form-settings-group {
            margin-left: 30px;
            padding-left: 30px;
            border-left: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
        }

        .sql-sync-label {
            margin: 0;
            font-weight: 700;
            font-size: 13px;
            color: var(--brand-600);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(232, 117, 72, 0.1);
            padding: 8px 14px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(232, 117, 72, 0.2);
            transition: var(--transition-smooth);
        }
        .sql-sync-label:hover {
            background: rgba(232, 117, 72, 0.15);
        }
        .sql-sync-label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--brand-500);
        }

        .btn-save {
            padding: 10px 20px;
            border-radius: var(--radius-md);
            border: none;
            background: var(--brand-500);
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow-brand);
            transition: var(--transition-smooth);
        }
        .btn-save:hover:not(:disabled) { background: var(--brand-600); transform: translateY(-1px); }
        .btn-save:disabled { background: var(--border-subtle); color: var(--text-tertiary); cursor: not-allowed; box-shadow: none; transform: none; }

        /* ── Status bar ── */
        #status-bar {
            background: var(--bg-surface);
            color: var(--text-tertiary);
            font-size: 11px;
            font-weight: 600;
            padding: 8px 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            border-top: 1px solid var(--border-subtle);
        }
        #status-bar .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--status-success); }
        #status-bar.saving .dot { background: var(--status-warning); animation: pulseSoft 2s infinite; }
        #status-bar.error .dot { background: var(--status-error); }
        @keyframes pulseSoft { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* ── Builder area ── */
        #builder-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: block;
        }

        #formio-builder {
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-lifted);
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ── AESTHETIC OVERRIDES ONLY ── */
        .formio-dialog { z-index: 10000 !important; }

        .builder-sidebar .card { border-color: var(--border-subtle) !important; margin-bottom: 12px !important; border-radius: var(--radius-md) !important; box-shadow: var(--shadow-soft) !important;}
        .builder-sidebar .card-header { padding: 10px 14px !important; font-size: 12px !important; font-weight: 700 !important; background: var(--accent-50) !important; color: var(--accent-700) !important; border-bottom: 1px solid var(--accent-200) !important; text-transform: uppercase; letter-spacing: 0.05em; }
        .builder-sidebar .card-body { padding: 10px !important; }

        .builder-group-button {
            padding: 8px 12px !important;
            font-size: 12px !important;
            font-weight: 500 !important;
            margin-bottom: 6px !important;
            border: 1px solid var(--border-subtle) !important;
            border-radius: var(--radius-sm) !important;
            color: var(--text-secondary) !important;
            background: var(--bg-surface) !important;
            transition: var(--transition-smooth) !important;
            box-shadow: none !important;
            width: 100% !important;
            text-align: left !important;
        }
        .builder-group-button i { margin-right: 8px !important; color: var(--accent-500) !important; font-size: 14px !important; width: 20px; text-align: center; }
        .builder-group-button:hover { background: var(--accent-50) !important; color: var(--accent-700) !important; border-color: var(--accent-300) !important; transform: translateX(2px); }

        .builder-components {
            padding: 20px !important;
            background: var(--bg-canvas) !important;
            border: 2px dashed #d6d3d1 !important;
            border-radius: var(--radius-md) !important;
        }
        .builder-component { padding: 16px !important; margin-bottom: 12px !important; border: 1px solid var(--border-subtle) !important; border-radius: var(--radius-md) !important; background: var(--bg-surface) !important; box-shadow: var(--shadow-soft) !important; transition: var(--transition-smooth) !important;}
        .builder-component:hover { border-color: var(--brand-400) !important; box-shadow: var(--shadow-lifted) !important; }
        .component-btn-group .btn { padding: 4px 8px !important; font-size: 11px !important; border-radius: 4px !important;}

        .form-control { font-size: 13px !important; padding: 6px 12px !important; height: auto !important; border-radius: var(--radius-sm) !important; border: 1px solid #d6d3d1 !important; color: var(--text-primary) !important; background: var(--bg-surface) !important; transition: var(--transition-smooth) !important;}
        .form-control:focus { border-color: var(--accent-500) !important; box-shadow: 0 0 0 3px rgba(168, 85, 166, 0.15) !important; outline: none !important;}
        .col-form-label, .control-label { font-size: 13px !important; font-weight: 600 !important; color: var(--text-secondary) !important; margin-bottom: 6px !important; }

        .btn { font-size: 13px !important; padding: 8px 16px !important; border-radius: var(--radius-md) !important; font-weight: 600 !important; }
        .btn-primary { background-color: var(--brand-500) !important; border-color: var(--brand-500) !important; }
        .btn-primary:hover { background-color: var(--brand-600) !important; }

        .formio-dialog-content { border-radius: var(--radius-lg) !important; border: 1px solid var(--border-subtle) !important; box-shadow: var(--shadow-lifted) !important; padding: 0 !important; }
        .component-settings .nav-tabs { border-bottom: 1px solid var(--border-subtle) !important; padding: 0 16px !important; background: var(--bg-canvas-subtle) !important; border-radius: var(--radius-lg) var(--radius-lg) 0 0 !important; }
        .component-settings .nav-tabs .nav-link { padding: 12px 16px !important; font-size: 13px !important; font-weight: 600 !important; color: var(--text-tertiary) !important; border: none !important; border-bottom: 2px solid transparent !important; transition: var(--transition-smooth) !important; }
        .component-settings .nav-tabs .nav-link.active { color: var(--accent-700) !important; background: transparent !important; border-bottom: 2px solid var(--accent-500) !important; }
        .component-settings .nav-tabs .nav-link:hover:not(.active) { color: var(--accent-500) !important; border-bottom: 2px solid var(--border-subtle) !important; }

        /* ── Loading overlay ── */
        #overlay {
            position: fixed; inset: 0; background: rgba(250, 250, 248, 0.85); backdrop-filter: blur(4px);
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
            color: var(--text-secondary); z-index: 9999;
        }
        #overlay.hidden { display: none; }
        #overlay .spinner { width: 36px; height: 36px; border: 3px solid var(--border-subtle); border-top-color: var(--accent-500); border-radius: 50%; animation: spin 0.8s linear infinite; }
        #overlay .message { font-size: 14px; font-weight: 600; color: var(--text-primary); }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Toast Notifications ── */
        #toast-container {
            position: fixed; bottom: 24px; left: 24px; z-index: 10000;
            display: flex; flex-direction: column; gap: 10px; pointer-events: none;
        }
        .toast-msg {
            background: var(--status-error); color: white; padding: 12px 20px;
            border-radius: var(--radius-md); box-shadow: var(--shadow-lifted);
            font-size: 13px; font-weight: 600; opacity: 0; transform: translateY(10px);
            animation: slideIn 0.3s forwards, fadeOut 0.3s 4s forwards;
            display: flex; align-items: center; gap: 8px;
        }
        @keyframes slideIn { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(10px); } }

        /* ========================================================================= */
        /* FIX: DataGrid & EditGrid Choices.js Dropdown Squishing & Clipping Fix     */
        /* ========================================================================= */
        .formio-component-datagrid .table-responsive,
        .formio-component-editgrid .table-responsive {
            overflow: visible !important;
        }
        .formio-component-datagrid table,
        .formio-component-datagrid td,
        .formio-component-datagrid th,
        .formio-component-editgrid table,
        .formio-component-editgrid td,
        .formio-component-editgrid th {
            overflow: visible !important;
        }
        .formio-component-datagrid .form-group,
        .formio-component-editgrid .form-group {
            position: relative !important;
        }
        .formio-component-datagrid .choices__list--dropdown,
        .formio-component-editgrid .choices__list--dropdown {
            z-index: 99999 !important;
            position: absolute !important;
            min-width: 250px !important;
            width: max-content !important;
            white-space: nowrap !important;
            height: auto !important;
        }
        .formio-component-datagrid .choices__list--dropdown .choices__list,
        .formio-component-editgrid .choices__list--dropdown .choices__list {
            max-height: 250px !important;
            overflow-y: auto !important;
        }
    </style>
</head>
<body>

<div id="overlay">
    <div class="spinner"></div>
    <div class="message" id="overlay-message">Initializing workspace…</div>
</div>

<div id="toast-container"></div>

<div id="toolbar">
    <div class="toolbar-left">
        <button class="btn-back" id="btn-cancel">
            <i class="fas fa-arrow-left"></i> Back to Forms
        </button>
        <div class="title-wrapper">
            <div class="title-inputs">
                <input id="form-title-input" type="text" placeholder="Untitled Form..." value=""/>
                <div class="path-group">
                    <span>API ID:</span>
                    <input id="form-path-input" type="text" placeholder="auto-generated-id" />
                    <i class="fas fa-link path-lock" id="path-lock-icon" title="API ID auto-syncs with Title. Click to lock manually."></i>
                </div>
            </div>

            <div class="form-settings-group">
                <label class="sql-sync-label" title="Appends the 'sql' tag to the form root when saving. Enables the SQL Save panel on Submit buttons.">
                    <input type="checkbox" id="form-sql-checkbox" />
                    Enable SQL Sync
                </label>
            </div>
        </div>
    </div>
    <button class="btn-save" id="btn-save" disabled>
        <i class="fas fa-check"></i> <span id="save-label">Save Form</span>
    </button>
</div>

<div id="builder-wrapper">
    <div id="formio-builder"></div>
</div>

<div id="status-bar">
    <div class="dot"></div>
    <span id="status-text">Ready</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/formiojs@4.15.0/dist/formio.full.min.js"></script>

<script>
    // Global States
    window.isSqlSyncEnabled = false;
    window.FORM_SQL_COMPONENTS = [];
    window.FORM_COMPONENTS_KEYS = [];
</script>

<script>
    /**
     * form-builder-config.js Logic
     * Contains the custom builder definitions and schema injection logic.
     */
    window.FormBuilderConfig = {

        getOptions: function(SCHEMA_API) {

            // =========================================================================
            // ⚡ AUTO-FILL PANEL DEFINITION
            // =========================================================================
            const autoFillPanel = {
                weight: -900,
                type: 'panel',
                title: '⚡ Auto-Fill from Database Lookup',
                theme: 'info',
                collapsible: true,
                collapsed: true,
                components: [
                    {
                        type: 'select',
                        key: 'properties.autoFillSourceKey',
                        label: 'Select Lookup Component',
                        placeholder: 'Choose a Database Lookup field...',
                        description: 'Select an existing Database Lookup field on this form.',
                        dataSrc: 'custom',
                        data: { custom: "values = window.FORM_SQL_COMPONENTS || [];" },
                        valueProperty: 'value',
                        template: '<span>{{ item.label }}</span>',
                        input: true
                    },
                    {
                        type: 'textfield',
                        key: 'properties.autoFillTable',
                        label: 'Detected Source Table',
                        description: 'Automatically detected from the component you selected above.',
                        disabled: true,
                        input: true,
                        calculateValue: "var match = (window.FORM_SQL_COMPONENTS || []).find(function(c) { return c.value === data.properties.autoFillSourceKey; }); value = match ? match.table : '';",
                        customConditional: "show = !!data.properties.autoFillSourceKey;"
                    },
                    {
                        type: 'select',
                        key: 'properties.autoFillColumn',
                        label: 'Column to Extract',
                        placeholder: 'Select column...',
                        dataSrc: 'url',
                        data: { url: SCHEMA_API + '/columns?table={{ data.properties.autoFillTable }}' },
                        valueProperty: 'columnName',
                        template: '<span>{{ item.columnName }}</span>',
                        refreshOn: 'properties.autoFillTable',
                        clearOnRefresh: true,
                        input: true,
                        customConditional: "show = !!data.properties.autoFillTable;"
                    }
                ]
            };

            // =========================================================================
            // ⚙️ FLOWABLE PROCESS VARIABLE PANEL
            // =========================================================================
            const processVariablePanel = {
                weight: -1050,
                type: 'panel',
                title: '⚙️ Process Integration',
                theme: 'warning',
                collapsible: true,
                collapsed: false,
                components: [
                    {
                        type: 'checkbox',
                        key: 'properties.isProcessVariable',
                        label: 'Inject as Process Variable',
                        tooltip: 'If checked, the backend will capture this field and send it directly into the Flowable Workflow engine.',
                        input: true
                    }
                ]
            };

            // =========================================================================
            // ⚡ SUBMIT BUTTON SQL CONFIGURATION PANEL
            // =========================================================================
            const sqlSubmitConfigPanel = {
                weight: -900,
                type: 'panel',
                title: '⚡ SQL Save Configuration',
                theme: 'success',
                collapsible: true,
                collapsed: false,
                customConditional: "show = data.action === 'submit' && !!window.isSqlSyncEnabled;",
                components: [
                    {
                        type: 'editgrid',
                        key: 'properties.sqlTablesConfig',
                        label: 'SQL Tables to Update on Submit',
                        description: 'Configure which tables should be updated when the user submits the form.',
                        templates: {
                            header: '<div class="row"><div class="col-sm-12"><strong>Configured Tables</strong></div></div>',
                            row: '<div class="row"><div class="col-sm-10">{{ row.tableName }}</div><div class="col-sm-2"><div class="btn-group pull-right"><button class="btn btn-default btn-light btn-sm editRow"><i class="fa fa-edit"></i></button><button class="btn btn-danger btn-sm removeRow"><i class="fa fa-trash"></i></button></div></div></div>'
                        },
                        components: [
                            {
                                type: 'select',
                                key: 'tableName',
                                label: 'Target SQL Table',
                                placeholder: 'Select a database table to save to...',
                                dataSrc: 'url',
                                data: { url: SCHEMA_API + '/tables' },
                                valueProperty: 'tableName',
                                template: '<span>{{ item.tableName }}</span>',
                                input: true,
                                validate: { required: true }
                            },
                            {
                                type: 'datagrid',
                                key: 'keys',
                                label: 'Map Form Fields to Database Columns',
                                validate: { required: true, minLength: 1 },
                                calculateValue: "if (value && Array.isArray(value) && row && row.tableName) { value.forEach(function(r) { r._parentTable = row.tableName; }); } return value;",
                                components: [
                                    {
                                        type: 'hidden',
                                        key: '_parentTable'
                                    },
                                    {
                                        type: 'select',
                                        key: 'dbColumn',
                                        label: 'Target DB Column',
                                        dataSrc: 'url',
                                        data: { url: SCHEMA_API + '/columns?table={{ row._parentTable }}' },
                                        valueProperty: 'columnName',
                                        template: '<span>{{ item.columnName }}</span>',
                                        refreshOn: '_parentTable',
                                        clearOnRefresh: true,
                                        input: true,
                                        validate: { required: true }
                                    },
                                    {
                                        type: 'select',
                                        key: 'formField',
                                        label: 'Source Form Field',
                                        placeholder: 'Select field...',
                                        dataSrc: 'custom',
                                        data: { custom: "values = window.FORM_COMPONENTS_KEYS || [];" },
                                        valueProperty: 'value',
                                        template: '<span>{{ item.label }}</span>',
                                        input: true,
                                        validate: { required: true }
                                    }
                                ]
                            }
                        ]
                    }
                ]
            };

            // =========================================================================
            // ☁️ GOOGLE DRIVE UPLOAD SETUP PANEL
            // =========================================================================
            const gDrivePanel = {
                weight: -1000,
                type: 'panel',
                title: '⚡ Google Drive Setup',
                theme: 'primary',
                collapsible: false,
                customConditional: "show = !!(data.properties && data.properties.isGDriveFile === 'true');",
                components: [
                    {
                        type: 'textfield',
                        key: 'properties.gDriveFolder',
                        label: 'Google Drive Folder ID',
                        placeholder: 'e.g., 10MZoqNuJ0J40-Gy7HrOC_ka...',
                        description: 'The specific folder where this file should be stored in Google Drive.',
                        input: true,
                        validate: { required: true }
                    }
                ]
            };

            // =========================================================================
            // EDIT FORM CONFIGURATION (TAB TARGETING)
            // =========================================================================
            const editFormConfig = {
                select: [
                    {
                        key: 'display',
                        components: [
                            {
                                weight: -1000,
                                type: 'panel',
                                title: '⚡ Easy Database Setup',
                                theme: 'primary',
                                collapsible: false,
                                customConditional: "show = !!(data.properties && data.properties.isSqlTemplate === 'true');",
                                components: [
                                    {
                                        type: 'select',
                                        key: 'properties.sqlTable',
                                        label: 'Table Name',
                                        placeholder: 'Select a database table...',
                                        dataSrc: 'url',
                                        data: { url: SCHEMA_API + '/tables' },
                                        valueProperty: 'tableName',
                                        template: '<span>{{ item.tableName }}</span>',
                                        input: true,
                                        validate: { required: true }
                                    },
                                    {
                                        type: 'select',
                                        key: 'properties.sqlColumn',
                                        label: 'Display Column Name',
                                        placeholder: 'Select a column to display...',
                                        dataSrc: 'url',
                                        data: { url: SCHEMA_API + '/columns?table={{ data.properties.sqlTable }}' },
                                        valueProperty: 'columnName',
                                        template: '<span>{{ item.columnName }}</span>',
                                        refreshOn: 'properties.sqlTable',
                                        clearOnRefresh: true,
                                        input: true,
                                        validate: { required: true }
                                    },
                                    {
                                        type: 'datagrid',
                                        key: 'customFilterMapping',
                                        label: 'Filter Mapping (Required)',
                                        validate: { required: true, minLength: 1 },
                                        components: [
                                            {
                                                type: 'select',
                                                key: 'dbColumn',
                                                label: 'Database Column',
                                                dataSrc: 'url',
                                                data: { url: SCHEMA_API + '/columns?table={{ data.properties.sqlTable }}' },
                                                valueProperty: 'columnName',
                                                template: '<span>{{ item.columnName }}</span>',
                                                refreshOn: 'properties.sqlTable',
                                                clearOnRefresh: true,
                                                input: true,
                                                validate: { required: true }
                                            },
                                            {
                                                type: 'textfield',
                                                key: 'formField',
                                                label: 'Form Field Key',
                                                input: true,
                                                validate: { required: true }
                                            }
                                        ]
                                    }
                                ]
                            }
                        ]
                    }
                ]
            };

            // Helper to inject panels safely
            function injectToTab(componentType, tabKey, panel) {
                if (!editFormConfig[componentType]) editFormConfig[componentType] = [];
                let tab = editFormConfig[componentType].find(t => t.key === tabKey);
                if (!tab) {
                    tab = { key: tabKey, components: [] };
                    editFormConfig[componentType].push(tab);
                }
                tab.components.push(panel);
            }

            // 1. Inject Auto-Fill (Data tab)
            const autoFillCompatibleComponents = [
                'textfield', 'number', 'currency', 'textarea', 'email', 'phoneNumber',
                'password', 'hidden', 'datetime', 'time', 'day', 'radio', 'checkbox',
                'selectboxes', 'select'
            ];
            autoFillCompatibleComponents.forEach(type => injectToTab(type, 'data', autoFillPanel));

            // 2. Inject Process Variable (Display tab)
            const processVarCompatibleComponents = [...autoFillCompatibleComponents, 'file'];
            processVarCompatibleComponents.forEach(type => injectToTab(type, 'display', processVariablePanel));

            // 3. Inject Button SQL Config & GDrive Config
            injectToTab('button', 'display', sqlSubmitConfigPanel);
            injectToTab('file', 'display', gDrivePanel);

            // =========================================================================
            // 🔒 SAAS LOCKDOWN ROUTINE
            // =========================================================================
            const allFormioComponents = [
                ...processVarCompatibleComponents, 'button', 'panel', 'fieldset',
                'datagrid', 'editgrid', 'table', 'columns', 'well', 'signature', 'tags'
            ];

            allFormioComponents.forEach(type => {
                if (!editFormConfig[type]) editFormConfig[type] = [];

                injectToTab(type, 'api', { key: 'tags', ignore: true });
                injectToTab(type, 'api', { key: 'properties', ignore: true });
                injectToTab(type, 'data', { key: 'calculateValue', ignore: true });
                injectToTab(type, 'data', { key: 'customDefaultValue', ignore: true });
                injectToTab(type, 'validation', { key: 'custom', ignore: true });
                injectToTab(type, 'conditional', { key: 'customConditional', ignore: true });
                editFormConfig[type].push({ key: 'logic', ignore: true });
            });

            // =========================================================================
            // FINAL RETURN OBJECT
            // =========================================================================
            return {
                noDefaultSubmitButton: false,
                builder: {
                    databaseResources: {
                        title: 'Database Resources',
                        default: true,
                        weight: -10,
                        components: {
                            databaseLookup: {
                                title: 'Database Lookup',
                                key: 'databaseLookup',
                                icon: 'search',
                                schema: {
                                    "label": "Database Lookup",
                                    "labelPosition": "top",
                                    "widget": "choicesjs",
                                    "type": "select",
                                    "dataSrc": "url",
                                    "disabled": true,
                                    "properties": {
                                        "isSqlTemplate": "true",
                                        "sqlTable": "",
                                        "sqlColumn": ""
                                    },
                                    "customFilterMapping": [
                                        { "dbColumn": "", "formField": "" }
                                    ],
                                    "data": {
                                        "url": "",
                                        "headers": []
                                    },
                                    "valueProperty": "data",
                                    "idPath": "id",
                                    "template": "<span></span>",
                                    "filter": "",
                                    "searchEnabled": true,
                                    "authenticate": true,
                                    "input": true,
                                    "tableView": true
                                }
                            }
                        }
                    },
                    storageResources: {
                        title: 'Storage',
                        default: true,
                        weight: -9,
                        components: {
                            gdriveFile: {
                                title: 'Google Drive File',
                                key: 'gdriveFile',
                                icon: 'cloud-upload',
                                schema: {
                                    "label": "Upload to Google Drive",
                                    "type": "file",
                                    "storage": "url",
                                    "url": "https://infinity-plus-services-493376716946.asia-south2.run.app/api/storage/gdrive?folderId=",
                                    "fileKey": "file",
                                    "properties": {
                                        "isGDriveFile": "true",
                                        "gDriveFolder": ""
                                    }
                                }
                            }
                        }
                    }
                },
                editForm: editFormConfig
            };
        }
    };
</script>

<script>
    /**
     * form-builder-app.js Logic
     * Main initialization and logic for the Form Builder.
     */
    (function () {
        'use strict';

        const params      = new URLSearchParams(window.location.search);
        const jwtToken    = params.get('token');
        const editPath    = params.get('formPath');
        const backendBase = params.get('api') || (window.location.origin + '/api');

        const FORMS_API   = backendBase + '/forms';
        const BFF_API     = backendBase + '/formio-bff';
        const SCHEMA_API  = backendBase + '/schema';

        let builderInstance = null;
        let currentSchema   = {};
        let isDirty         = false;
        let isInitialized   = false; // NEW: Prevents Form.io from enabling save on boot
        let existingFormId  = null;
        let isPathManuallyEdited = !!editPath;

        const overlay      = document.getElementById('overlay');
        const overlayMsg   = document.getElementById('overlay-message');
        const statusBar    = document.getElementById('status-bar');
        const statusText   = document.getElementById('status-text');
        const titleInput   = document.getElementById('form-title-input');
        const pathInput    = document.getElementById('form-path-input');
        const pathLockIcon = document.getElementById('path-lock-icon');
        const btnSave      = document.getElementById('btn-save');
        const saveLabel    = document.getElementById('save-label');
        const btnCancel    = document.getElementById('btn-cancel');
        const sqlSyncCheck = document.getElementById('form-sql-checkbox');

        // NEW: Toast UI Helper
        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast-msg';
            toast.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4500);
        }

        function showOverlay(msg, isError = false) {
            if (isError) overlayMsg.style.color = 'var(--status-error)';
            overlayMsg.textContent = msg;
            overlay.classList.remove('hidden');
        }

        function hideOverlay() {
            overlay.classList.add('hidden');
        }

        function setStatus(msg, state = 'ready') {
            statusBar.className = state;
            statusText.textContent = msg;
        }

        function toSlug(str) {
            return str.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '').replace(/-+/g, '-').replace(/^-|-$/g, '');
        }

        // =========================================================================
        // NEW: Sync Path Lock Icon Logic
        // =========================================================================
        function updatePathLockUI() {
            if (isPathManuallyEdited) {
                pathLockIcon.className = 'fas fa-unlink path-lock unlinked';
                pathLockIcon.title = 'API ID is disconnected from Title. Click to re-sync.';
            } else {
                pathLockIcon.className = 'fas fa-link path-lock';
                pathLockIcon.title = 'API ID auto-syncs with Title. Click to lock manually.';
            }
        }

        pathLockIcon.addEventListener('click', () => {
            isPathManuallyEdited = !isPathManuallyEdited;
            if (!isPathManuallyEdited) {
                pathInput.value = toSlug(titleInput.value);
                markDirty();
            }
            updatePathLockUI();
        });

        // -- Event Listeners for Top Bar --
        titleInput.addEventListener('input', () => {
            if (!isPathManuallyEdited) {
                pathInput.value = toSlug(titleInput.value);
            }
            markDirty();
        });

        pathInput.addEventListener('input', () => {
            isPathManuallyEdited = true;
            updatePathLockUI();
            markDirty();
        });

        pathInput.addEventListener('blur', () => {
            pathInput.value = toSlug(pathInput.value);
        });

        sqlSyncCheck.addEventListener('change', (e) => {
            window.isSqlSyncEnabled = e.target.checked;
            markDirty();
        });

        function markDirty() {
            // ONLY enable save button if initialization is complete
            if (!isInitialized) return;
            isDirty = true;
            btnSave.disabled = !titleInput.value.trim() || !pathInput.value.trim();
        }

        // -- API Calls --
        async function fetchConfig() {
            const res = await fetch(BFF_API + '/config', { headers: { 'Authorization': 'Bearer ' + jwtToken } });
            if (!res.ok) throw new Error('Could not fetch builder config: ' + res.status);
            return await res.json();
        }

        async function loadExistingForm(formPath) {
            const res = await fetch(FORMS_API + '/' + formPath, {
                headers: { 'Authorization': 'Bearer ' + jwtToken }
            });
            if (!res.ok) throw new Error('Form not found: ' + formPath);
            const form = await res.json();
            existingFormId = form._id;

            titleInput.value = form.title || formPath;
            pathInput.value  = form.path || formPath;
            isPathManuallyEdited = true;
            updatePathLockUI();

            if (form.tags && form.tags.includes('sql')) {
                sqlSyncCheck.checked = true;
                window.isSqlSyncEnabled = true;
            }

            return form;
        }

        function updateSqlComponentsList(schema) {
            const sqlComps = [];
            const allKeys = [];

            if (schema && schema.components) {
                Formio.Utils.eachComponent(schema.components, (comp) => {
                    if (comp.key && comp.type !== 'button') {
                        allKeys.push({
                            label: (comp.label || comp.key) + ' (' + comp.key + ')',
                            value: comp.key
                        });
                    }
                    if (comp.properties && comp.properties.isSqlTemplate === 'true') {
                        sqlComps.push({
                            label: (comp.label || comp.key) + ' (' + comp.key + ')',
                            value: comp.key,
                            table: comp.properties.sqlTable
                        });
                    }
                });
            }
            window.FORM_SQL_COMPONENTS = sqlComps;
            window.FORM_COMPONENTS_KEYS = allKeys;
        }

        // -- Core Initialization --
        async function initBuilder(initialSchema) {
            const originalFetch = Formio.fetch;

            // =========================================================================
            // NEW: Global HTTP Interceptor for Error Handling
            // =========================================================================
            Formio.fetch = async function(url, options) {
                options = options || {};
                options.headers = options.headers || {};
                options.headers['Authorization'] = 'Bearer ' + jwtToken;
                try {
                    const response = await originalFetch.call(this, url, options);
                    if (!response.ok && url.includes(SCHEMA_API)) {
                        showToast('Database Error: Could not fetch schema data.');
                    }
                    return response;
                } catch (err) {
                    if (url.includes(SCHEMA_API)) {
                        showToast('Network Error: Database schema API is unreachable.');
                    }
                    throw err;
                }
            };

            Formio.setUser({ _id: 'admin', data: { email: 'admin@tenant.local' } });
            Formio.setBaseUrl(FORMS_API);
            Formio.setProjectUrl(FORMS_API);

            const container = document.getElementById('formio-builder');
            const builderOptions = window.FormBuilderConfig.getOptions(SCHEMA_API);

            builderInstance = await Formio.builder(container, initialSchema || {}, builderOptions);
            updateSqlComponentsList(builderInstance.schema);

            builderInstance.on('saveComponent', (component) => {
                if (component.properties && component.properties.isSqlTemplate === 'true') {
                    const table = component.properties.sqlTable;
                    const column = component.properties.sqlColumn;
                    const mappings = component.customFilterMapping || [];
                    if (table) component.data.url = 'https://infinity-plus-services-493376716946.asia-south2.run.app/api/forms/sql-data?table=' + table;
                    if (column) component.template = '<span>{{ item.data.' + column + ' }}</span>';
                    if (mappings.length > 0) {
                        const filterParts = mappings
                            .filter(m => m.dbColumn && m.formField)
                            .map(m => 'data.' + m.dbColumn + '={{data.' + m.formField + '}}');
                        component.filter = filterParts.join('&');
                    } else {
                        component.filter = '';
                    }
                }

                if (component.properties && component.properties.autoFillSourceKey && component.properties.autoFillColumn) {
                    const sourceKey = component.properties.autoFillSourceKey;
                    const colName = component.properties.autoFillColumn;
                    component.calculateValue = `value = data.${sourceKey} && data.${sourceKey}.data ? data.${sourceKey}.data.${colName} : '';`;
                    component.allowCalculateOverride = true;
                }

                component.tags = component.tags || [];
                if (component.properties && component.properties.isProcessVariable) {
                    if (!component.tags.includes('processVariable')) component.tags.push('processVariable');
                } else {
                    component.tags = component.tags.filter(t => t !== 'processVariable');
                }

                if (component.type === 'button' && component.action === 'submit') {
                    if (window.isSqlSyncEnabled) {
                        const tablesConfig = component.properties.sqlTablesConfig || [];
                        const sqlConfigObj = [];
                        tablesConfig.forEach(tConf => {
                            const table = tConf.tableName;
                            const mappings = tConf.keys || [];
                            if (table && mappings.length > 0) {
                                const keysObj = {};
                                mappings.forEach(m => {
                                    if (m.dbColumn && m.formField && m.dbColumn !== '_parentTable') {
                                        keysObj[m.dbColumn] = m.formField;
                                    }
                                });
                                sqlConfigObj.push({ "table": table, "keys": keysObj });
                            }
                        });
                        if (sqlConfigObj.length > 0) {
                            component.properties.sqlConfig = JSON.stringify(sqlConfigObj);
                        } else {
                            delete component.properties.sqlConfig;
                        }
                    } else {
                        if (component.properties) delete component.properties.sqlConfig;
                    }
                }

                if (component.type === 'file' && component.properties && component.properties.isGDriveFile === 'true') {
                    const folder = component.properties.gDriveFolder;
                    if (folder) {
                        component.url = `https://infinity-plus-services-493376716946.asia-south2.run.app/api/storage/gDrive?folderId=${folder}`;
                    }
                }
            });

            builderInstance.on('change', (schema) => {
                currentSchema = schema;
                updateSqlComponentsList(schema);
                markDirty();
            });

            hideOverlay();

            // =========================================================================
            // NEW: Prevent Save Button active state on load
            // =========================================================================
            setTimeout(() => {
                isInitialized = true;
                isDirty = false;
                btnSave.disabled = true;
            }, 500);
        }

        async function saveForm() {
            const title = titleInput.value.trim();
            let path = pathInput.value.trim();

            if (!title) { alert('Please enter a form title.'); return; }
            path = toSlug(path);
            if (!path) { alert('Form ID must contain at least one letter or number.'); return; }
            pathInput.value = path;

            currentSchema.tags = currentSchema.tags || [];
            if (window.isSqlSyncEnabled) {
                if (!currentSchema.tags.includes('sql')) currentSchema.tags.push('sql');
            } else {
                currentSchema.tags = currentSchema.tags.filter(t => t !== 'sql');
            }

            btnSave.disabled = true;
            saveLabel.textContent = 'Saving…';
            setStatus('Saving to database…', 'saving');

            const formPayload = { ...currentSchema, title, name: path, path, type: 'form', display: currentSchema.display || 'form' };

            try {
                let res;
                if (existingFormId) {
                    res = await fetch(FORMS_API + '/form/' + existingFormId, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + jwtToken },
                        body: JSON.stringify(formPayload)
                    });
                } else {
                    res = await fetch(FORMS_API + '/form', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + jwtToken },
                        body: JSON.stringify(formPayload)
                    });
                }

                if (!res.ok) { const err = await res.text(); throw new Error(err); }
                const saved = await res.json();
                existingFormId = saved._id || existingFormId;
                isDirty = false;
                btnSave.disabled = true; // Stay disabled until next edit
                saveLabel.textContent = 'Save Form';
                setStatus('Saved successfully ✓', 'ready');

                window.parent.postMessage({ type: 'FORMIO_FORM_SAVED', formId: saved._id, formPath: saved.path, formTitle: saved.title }, '*');
            } catch (e) {
                console.error('Save failed:', e);
                btnSave.disabled = false;
                saveLabel.textContent = 'Save Form';
                setStatus('Save failed', 'error');
                showToast('Failed to save form. Check your network.');
            }
        }

        function cancel() {
            if (isDirty && !confirm('You have unsaved changes. Are you sure you want to discard them?')) return;
            window.parent.postMessage({ type: 'FORMIO_BUILDER_CLOSED' }, '*');
        }

        btnSave.addEventListener('click', saveForm);
        btnCancel.addEventListener('click', cancel);

        // -- Boot Sequence --
        (async function boot() {
            try {
                if (!jwtToken) throw new Error('No authentication token provided.');

                // Initialize the lock icon UI
                updatePathLockUI();

                const config = await fetchConfig();

                let initialSchema = {};
                if (editPath) initialSchema = await loadExistingForm(editPath);

                await initBuilder(initialSchema);
            } catch (err) {
                console.error('Builder boot failed:', err);
                showOverlay('Failed to load: ' + err.message, true);
                setStatus('Offline', 'error');
            }
        })();

    })();
</script>

</body>
