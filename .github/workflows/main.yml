name: Deploy Backend (Flowable)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'flowable-app/**'
  workflow_dispatch:

env:
  PROJECT_ID: myfirsttestproject-456102
  REGION: asia-south2
  GAR_LOCATION: asia-south2-docker.pkg.dev/myfirsttestproject-456102/infinity-images
  SERVICE_NAME: flowable-app-backend
  # The account the App uses while RUNNING (needs Secret Accessor permission)
  RUNTIME_SERVICE_ACCOUNT: jinsan-sheet-access-account@myfirsttestproject-456102.iam.gserviceaccount.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # Required for Workload Identity Federation

    defaults:
      run:
        working-directory: ./flowable-app

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Authenticate to Google Cloud (Secure WIF)
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/493376716946/locations/global/workloadIdentityPools/github-wif-pool/providers/github-provider-3
          service_account: github-actions-sa-saarbiotech@myfirsttestproject-456102.iam.gserviceaccount.com
          token_format: 'access_token'

      # 2. Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Login to Artifact Registry
      - name: Docker Auth
        uses: docker/login-action@v3
        with:
          registry: asia-south2-docker.pkg.dev
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'

      # 4. Build and Push
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./flowable-app
          push: true
          tags: ${{ env.GAR_LOCATION }}/flowable-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5. Deploy to Cloud Run
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}/flowable-app:latest
          flags: |
            --allow-unauthenticated
            --port=8080
            --service-account=${{ env.RUNTIME_SERVICE_ACCOUNT }}
            --add-cloudsql-instances=myfirsttestproject-456102:asia-south2:infinity-production
          env_vars: |
            SPRING_CLOUD_GCP_SQL_DATABASE_NAME=infinity_flowable_db
            SPRING_CLOUD_GCP_SQL_INSTANCE_CONNECTION_NAME=myfirsttestproject-456102:asia-south2:infinity-production
            SPRING_DATASOURCE_USERNAME=infinity-flowable-test
            SPRING_DATASOURCE_URL=jdbc:mysql://localhost/infinity_flowable_db
            FORMIO_URL=https://infinity-formio-server-493376716946.asia-south2.run.app
            APP_FRONTEND_URL=https://workflow-ui-react.vercel.app/
            FORMIO_ADMIN_EMAIL=admin@example.com
            SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID=181377661836-8nppi95a1hv5qheq5hjj4d1uvsf1ehlp.apps.googleusercontent.com
            SPRING_CLOUD_GCP_CREDENTIALS_LOCATION=
            SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_REDIRECT_URI=https://flowable-app-backend-493376716946.asia-south2.run.app/login/oauth2/code/google
            SERVER_FORWARD_HEADERS_STRATEGY=framework
            APP_BACKEND_URL=https://flowable-app-backend-493376716946.asia-south2.run.app
          # 🟢 PROPER SECRET MAPPING (Env Var = Secret Name : Version)
          secrets: |
            SPRING_DATASOURCE_PASSWORD=FLOWABLE_DB_PASSWORD:latest
            FORMIO_ADMIN_PASSWORD=FLOWABLE_FORMIO_ADMIN_PASSWORD:latest
            GOOGLE_CLIENT_SECRET=FLOWABLE_GOOGLE_CLIENT_SECRET:latest
            APP_JWT_SECRET=FLOWABLE_APP_JWT_SECRET:latest