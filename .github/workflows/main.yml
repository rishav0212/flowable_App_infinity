name: Deploy Backend (From Repo)

on:
  push:
    branches: "**"

env:
  PROJECT_ID: myfirsttestproject-456102
  REGION: asia-south2
  # 🟢 USING ARTIFACT REGISTRY
  GAR_LOCATION: asia-south2-docker.pkg.dev/myfirsttestproject-456102/infinity-images
  SERVICE_NAME: flowable-app-backend
  RUNTIME_SERVICE_ACCOUNT: jinsan-sheet-access-account@myfirsttestproject-456102.iam.gserviceaccount.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for Workload Identity

    steps:
      # 1. Checkout Code directly from Repo
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Authenticate to Google Cloud (WIF)
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/493376716946/locations/global/workloadIdentityPools/github-wif-pool/providers/github-provider-3
          service_account: github-actions-sa-saarbiotech@myfirsttestproject-456102.iam.gserviceaccount.com
          token_format: "access_token"

      # 3. Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Login to Artifact Registry
      - name: Docker Auth
        uses: docker/login-action@v3
        with:
          registry: asia-south2-docker.pkg.dev
          username: "oauth2accesstoken"
          password: "${{ steps.auth.outputs.access_token }}"

      # 5. Build and Push
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          # 🟢 MODIFIED: Points to repository root.
          # If your Dockerfile is in a subfolder, change '.' to './folder-name'
          context: .
          push: true
          tags: ${{ env.GAR_LOCATION }}/flowable-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 6. Deploy to Cloud Run
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}/flowable-app:latest
          flags: |
            --allow-unauthenticated
            --port=8080
            --service-account=${{ env.RUNTIME_SERVICE_ACCOUNT }}
            --add-cloudsql-instances=myfirsttestproject-456102:asia-south2:infinity-production
            --memory=2Gi
            --cpu=2
            --max-instances=3
            --timeout=1000s
            --cpu-boost
          env_vars: |
            SPRING_CLOUD_GCP_SQL_DATABASE_NAME=infinity_flowable_db
            SPRING_CLOUD_GCP_SQL_INSTANCE_CONNECTION_NAME=myfirsttestproject-456102:asia-south2:infinity-production
            SPRING_DATASOURCE_USERNAME=infinity-flowable-test
            SPRING_DATASOURCE_URL=jdbc:mysql://localhost/infinity_flowable_db
            FORMIO_URL=https://infinity-formio-server-493376716946.asia-south2.run.app
            APP_FRONTEND_URL=https://workflow-ui-react.vercel.app/
            FORMIO_ADMIN_EMAIL=admin@example.com
            SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID=493376716946-ttnbp0o0mfp8tig8p62ittp2tb5q9coe.apps.googleusercontent.com
            SPRING_CLOUD_GCP_CREDENTIALS_LOCATION=
            SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_REDIRECT_URI=https://flowable-app-backend-493376716946.asia-south2.run.app/login/oauth2/code/google
            SERVER_FORWARD_HEADERS_STRATEGY=framework
            APP_BACKEND_URL=https://flowable-app-backend-493376716946.asia-south2.run.app
          secrets: |
            SPRING_DATASOURCE_PASSWORD=INFINITY_DB_PASSWORD:latest
            FORMIO_ADMIN_PASSWORD=INFINITY_FORMIO_ADMIN_KEY:latest
            GOOGLE_CLIENT_SECRET=INFINITY_GOOGLE_CLIENT_SECRET:latest
            APP_JWT_SECRET=INFINITY_JWT_SIGNING_KEY:latest